name: Scrape daily

on:
  schedule:
    # 02:00 UTC = 03:00/04:00 CET. Run quand peu de monde scrape GitHub.
    - cron: "0 2 * * *"
  workflow_dispatch:    # bouton "Run workflow" manuel depuis l'UI GitHub
    inputs:
      mode:
        description: "Quel scrape lancer ?"
        required: true
        default: "max"
        type: choice
        options:
          - max          # exhaustive Sourcegraph (40 sub-queries × 2 kinds)
          - all          # scrape:all (skills + claude-md + aggregators + codesearch single pass)
          - codesearch   # codesearch only

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 50    # 60 min budget free, on garde 10 min de marge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run scrape
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKENS: ${{ secrets.SCRAPE_GITHUB_TOKENS }}
          SCRAPE_BATCH_SIZE: "10"     # flushe DB tous les 10 items
          SCRAPE_CONCURRENCY: "2"
        run: |
          case "${{ inputs.mode || 'max' }}" in
            max) npm run scrape:max ;;
            all) npm run scrape:all ;;
            codesearch) npm run scrape:codesearch ;;
          esac
      - name: Summary
        if: always()
        run: |
          echo "Scrape mode : ${{ inputs.mode || 'max' }}"
          echo "Done at : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
