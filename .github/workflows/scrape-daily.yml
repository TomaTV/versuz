name: Scrape daily

on:
  schedule:
    # 02:00 UTC = 03:00/04:00 CET. Run quand peu de monde scrape GitHub.
    - cron: "0 2 * * *"
  workflow_dispatch:    # bouton "Run workflow" manuel depuis l'UI GitHub
    inputs:
      mode:
        description: "Quel scrape lancer ?"
        required: true
        default: "all"
        type: choice
        options:
          - all          # github + aggregators + codesearch sériel — défaut daily
          - codesearch   # Sourcegraph + grep.app uniquement — lighter
          - max          # exhaustive (40 sub-queries × 2 kinds) — manuel only
      max_new:
        description: "Cap nouveaux items par run (défaut 2000)"
        required: false
        default: "2000"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 50    # 60 min budget free, on garde 10 min de marge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run scrape
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKENS: ${{ secrets.SCRAPE_GITHUB_TOKENS }}
          # Cloudflare R2 — content storage (writes via S3 SDK + read URLs).
          # Without these, uploadContentMd() falls back to Supabase Storage,
          # which has been wiped post-migration — newly scraped items would
          # be unreadable. ALL 5 are required for the write path.
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          SCRAPE_BATCH_SIZE: "10"          # flushe DB tous les 10 items
          SCRAPE_CONCURRENCY: "2"
          SCRAPE_USE_STORAGE: "1"          # write to Storage bucket directly
          SCRAPE_MAX_NEW: ${{ inputs.max_new || '2000' }}
        run: |
          MODE="${{ inputs.mode || 'all' }}"
          echo "Running scrape mode=$MODE with SCRAPE_MAX_NEW=$SCRAPE_MAX_NEW"
          case "$MODE" in
            max)        npm run scrape:max ;;
            all)        npm run scrape ;;             # unified scraper, all sources serial — default
            codesearch) npm run scrape:codesearch ;;
            *)          npm run scrape ;;
          esac

      - name: Backfill byte counts
        if: success()
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/backfill-byte-counts.mjs --apply

      - name: Summary
        if: always()
        run: |
          echo "Scrape mode : ${{ inputs.mode || 'all' }}"
          echo "Max new : ${{ inputs.max_new || '2000' }}"
          echo "Done at : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
