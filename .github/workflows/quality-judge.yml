name: Quality judge

# Run the LLM-rated quality judge across the catalog. Each item gets a
# 5-axis score (clarity / specificity / completeness / structure / usefulness).
#
# Provider chain (mai 2026 v3) :
#   primary   : openrouter-free (10 models, less-saturated picks first)
#   fallback  : groq (gpt-oss-120b/20b, llama-3.3-70b, llama-4-scout)
#
# OR `:free` tier is a GLOBALLY pooled bucket → expect 429s constant
# on the popular IDs. Single source of truth for the model list is in
# scripts/bench/quality-judge.mjs `FALLBACK_CHAINS`. Free-tier retry
# budget is tight (1 attempt, 8s wait) so a busy model rotates out fast
# enough that Groq fallback is reached well before the 55min timeout.
#
# Strategy : drain as many unjudged items as the timeout allows per run,
# multiple runs per day to chip away at the backlog quickly.

on:
  schedule:
    # Every 4 hours → 6 runs/day. Combined with --limit=50000 per run, we
    # blast through any backlog. Free tier (OR + Groq), zero $ cost.
    - cron: "5 */4 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max items processed per run"
        required: false
        default: "50000"
      kind:
        description: "Subject kind"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - skill
          - claude_md

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run quality judge
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Primary : OpenRouter free chain (4 models, separate quotas).
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Fallback : Groq free chain quand l'OR free TPD est exhausted.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Cloudflare R2 — read SKILL.md / CLAUDE.md content via CDN.
          # publicContentUrl() routes to R2 when R2_PUBLIC_URL is set; without
          # it the script falls back to Supabase Storage (wiped post-migration)
          # → 404 sur tout le catalogue. Reads only need the public URL, but
          # we pass all 5 for consistency / future write paths.
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          QUALITY_CONCURRENCY: "8"
        run: |
          LIMIT="${{ inputs.limit || '50000' }}"
          KIND="${{ inputs.kind || 'both' }}"
          echo "Quality judge · limit=$LIMIT kind=$KIND · provider=openrouter-free → groq"
          COMMON="--limit=$LIMIT --provider=openrouter-free --fallback-provider=groq"
          if [ "$KIND" = "skill" ]; then
            node scripts/bench/quality-judge.mjs $COMMON --kind=skill
          elif [ "$KIND" = "claude_md" ]; then
            node scripts/bench/quality-judge.mjs $COMMON --kind=claude_md
          else
            node scripts/bench/quality-judge.mjs $COMMON
          fi
      - name: Summary
        if: always()
        run: |
          echo "Limit : ${{ inputs.limit || '50000' }}"
          echo "Kind : ${{ inputs.kind || 'both' }}"
          echo "Done at : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
