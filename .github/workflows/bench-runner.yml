name: Bench runner

# Daily bench drain. The Vercel cron `/api/cron/bench` enqueues 14 scopes
# at 04:00 UTC. This worker drains them under TIGHT budget caps :
#   - per-run     : $1   (single judge or shallow 3-judge)
#   - per-day     : $3   (max 3 runs/day if manually triggered)
#   - per-month   : ~$25-30 (= 30 daily runs × $1, with safety margin)
#
# Why so conservative : Versuz V1 budget. We want predictable
# OpenRouter spend. Quality judging is offloaded to Groq free
# (quality-judge.yml every 4h) — bench here is just the LMArena-style
# 5-axis judging for items already quality-screened.

on:
  schedule:
    # Drain toutes les 4h (mai 2026) au lieu de 1×/jour. Cycles créés par
    # /api/cron/bench à 04:00 UTC sont picked up dans <4h max (vs 23h avant).
    # Reste largement sous le BENCH_BUDGET_USD cap mensuel grâce au $1/run.
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode bench"
        required: true
        default: "or-v1"
        type: choice
        options:
          - or-thrift     # GPT-5 nano seul (~$0.30/run)
          - or-v1         # Haiku + DeepSeek + GPT-5 mini (~$1/run)
          - dev           # Groq Llama free (test only)
      budget_usd:
        description: "Budget cap (USD) — runner halt si atteint"
        required: false
        default: "1"
      scope:
        description: "Scope unique (vide = pick le premier cycle queued)"
        required: false
        default: ""

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Check monthly budget
        id: budget_check
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MONTHLY_CAP_USD: "25"
        run: |
          # Sum the cost of all cycles in the last 30 days. Halt if we've
          # already burned through the monthly cap. The `cycles` table has
          # an `actual_cost_usd` column populated at cycle completion.
          node -e "
            import('@supabase/supabase-js').then(async ({createClient}) => {
              const sb = createClient(process.env.NEXT_PUBLIC_SUPABASE_URL, process.env.SUPABASE_SERVICE_ROLE_KEY);
              const since = new Date(Date.now() - 30 * 24 * 3600 * 1000).toISOString();
              const { data, error } = await sb
                .from('cycles')
                .select('actual_cost_usd')
                .gte('started_at', since)
                .not('actual_cost_usd', 'is', null);
              if (error) { console.warn('[budget] check failed (non-fatal):', error.message); return; }
              const total = (data || []).reduce((s, c) => s + Number(c.actual_cost_usd || 0), 0);
              const cap = Number(process.env.MONTHLY_CAP_USD || 25);
              console.log('[budget] 30-day spend: $' + total.toFixed(2) + ' / cap $' + cap);
              if (total >= cap) {
                console.log('[budget] MONTHLY CAP REACHED — skipping run');
                process.exit(78); // Special exit code: budget exceeded
              }
            });
          " || {
            EXIT=$?
            if [ "$EXIT" = "78" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "Monthly budget cap reached. Halting bench run."
              exit 0
            fi
            exit $EXIT
          }

      - name: Run bench
        if: steps.budget_check.outputs.skip != 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Optional — Gemini 2.5 Flash via Google AI Studio (free 1500 RPD).
          # If unset, agent auto-falls-back to Groq Llama free at runtime
          # below — never hard-fails on missing secret.
          GOOGLE_AI_STUDIO_KEY: ${{ secrets.GOOGLE_AI_STUDIO_KEY }}
          BENCH_MODE: ${{ inputs.mode || 'or-v1' }}
          BENCH_BUDGET_USD: ${{ inputs.budget_usd || '1' }}
          BENCH_JUDGE_COUNT: ${{ inputs.mode == 'or-v1' && '3' || '1' }}
        run: |
          # Agent selection — matched to the bench mode :
          #   or-v1 / v1 / v1-thrift  → DeepSeek V4 Flash via OpenRouter
          #                             (OR key always set, ~$0.30/day, matches
          #                              CLAUDE.md spec "DeepSeek V4 Flash agent")
          #   dev / prod / gold       → Gemini 2.5 Flash via Google AI Studio
          #                             (free 1500 RPD) if key present, else
          #                             Groq Llama free fallback.
          MODE="${{ inputs.mode || 'or-v1' }}"
          if [ "$MODE" = "or-v1" ] || [ "$MODE" = "v1" ] || [ "$MODE" = "v1-thrift" ]; then
            export BENCH_AGENT_PROVIDER=openrouter
            export BENCH_AGENT_MODEL=deepseek/deepseek-v4-flash
            echo "[bench-runner] agent : openrouter/deepseek-v4-flash (~\$0.30/day)"
          elif [ -n "$GOOGLE_AI_STUDIO_KEY" ]; then
            export BENCH_AGENT_PROVIDER=google
            export BENCH_AGENT_MODEL=gemini-2.5-flash
            echo "[bench-runner] agent : google/gemini-2.5-flash (free 1500 RPD)"
          else
            export BENCH_AGENT_PROVIDER=groq
            export BENCH_AGENT_MODEL=llama-3.3-70b-versatile
            echo "[bench-runner] agent : groq/llama-3.3-70b-versatile (free fallback)"
          fi
          if [ -n "${{ inputs.scope }}" ]; then
            node scripts/bench/index.mjs --scope=${{ inputs.scope }} --concurrency=6
          else
            # No scope = drain le premier cycle queued (resume FIFO)
            node scripts/bench/index.mjs --concurrency=6
          fi

      - name: Refresh rankings
        if: success() && steps.budget_check.outputs.skip != 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node -e "
            import('@supabase/supabase-js').then(({createClient}) => {
              const sb = createClient(process.env.NEXT_PUBLIC_SUPABASE_URL, process.env.SUPABASE_SERVICE_ROLE_KEY);
              return sb.rpc('refresh_rankings');
            }).then(r => console.log('rankings refreshed', r));
          "
